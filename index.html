        setSlackConfig({
          client_name: client.client_name,
          slack_webhook_url: client.branding?.slack_webhook_url || '',
          slack_channel_name: client.branding?.slack_channel_name || '',
        });
      };

      const handleSaveSlack = async () => {
        if (!slackConfig) return;
        await api(`/slack/${encodeURIComponent(slackConfig.client_name)}`, {
          method: 'PUT',
          body: JSON.stringify({
            slack_webhook_url: slackConfig.slack_webhook_url,
            slack_channel_name: slackConfig.slack_channel_name,
          }),
        });
        setSlackConfig(null);
        fetchClients();
      };

      const handleTestSlack = async () => {
        if (!slackConfig) return;
        // Save first, then test
        await api(`/slack/${encodeURIComponent(slackConfig.client_name)}`, {
          method: 'PUT',
          body: JSON.stringify({
            slack_webhook_url: slackConfig.slack_webhook_url,
            slack_channel_name: slackConfig.slack_channel_name,
          }),
        });
        setSlackTesting(true);
        const res = await api(`/slack/${encodeURIComponent(slackConfig.client_name)}/test`, { method: 'POST' });
        setSlackTesting(false);
        if (res && res.success) alert('Test notification sent! Check your Slack channel.');
        else alert('Failed to send test notification. Check the webhook URL.');
        fetchClients();
      };

      // User management functions
      const openManageUsers = async (client) => {
        setManageUsersFor(client.client_name);
        const data = await api(`/clients/${encodeURIComponent(client.client_name)}/users`);
        if (Array.isArray(data)) setClientUsers(data);
        setNewUser({ username: '', password: '', name: '', email: '' });
        setEditUser(null);
      };

      const handleAddUser = async () => {
        if (!newUser.username.trim() || !newUser.password.trim()) return alert('Username and password are required');
        const res = await api(`/clients/${encodeURIComponent(manageUsersFor)}/users`, {
          method: 'POST', body: JSON.stringify(newUser)
        });
        if (res && !res.error) {
          setNewUser({ username: '', password: '', name: '', email: '' });
          const data = await api(`/clients/${encodeURIComponent(manageUsersFor)}/users`);
          if (Array.isArray(data)) setClientUsers(data);
          fetchClients();
        } else if (res?.error) { alert(res.error); }
      };

      const handleSaveUser = async () => {
        if (!editUser) return;
        const payload = { username: editUser.username, name: editUser.name, email: editUser.email };
        if (editUser.newPassword && editUser.newPassword.trim()) payload.password = editUser.newPassword.trim();
        const res = await api(`/clients/users/${editUser.id}`, { method: 'PUT', body: JSON.stringify(payload) });
        if (res && !res.error) {
          setEditUser(null);
          const data = await api(`/clients/${encodeURIComponent(manageUsersFor)}/users`);
          if (Array.isArray(data)) setClientUsers(data);
          fetchClients();
        } else if (res?.error) { alert(res.error); }
      };

      const handleDeleteUser = async (userId) => {
        if (!confirm('Delete this user? They will no longer be able to log in.')) return;
        await api(`/clients/users/${userId}`, { method: 'DELETE' });
        const data = await api(`/clients/${encodeURIComponent(manageUsersFor)}/users`);
        if (Array.isArray(data)) setClientUsers(data);
        fetchClients();
      };

      // Team member functions
      const handleAddMember = async () => {
        if (!newMemberName.trim()) return;
        const res = await api('/team-members', { method: 'POST', body: JSON.stringify({ name: newMemberName.trim(), email: newMemberEmail.trim(), role: newMemberRole.trim(), avatar_color: newMemberColor }) });
        if (res && !res.error) { setNewMemberName(''); setNewMemberEmail(''); setNewMemberRole(''); setNewMemberColor('#6c5ce7'); onTeamMembersChange(); }
      };

      const handleUpdateMember = async () => {
        if (!editMember) return;
        await api(`/team-members/${editMember.id}`, { method: 'PUT', body: JSON.stringify(editMember) });
        setEditMember(null); onTeamMembersChange();
      };

      const handleDeleteMember = async (id) => {
        if (!confirm('Remove this team member?')) return;
        await api(`/team-members/${id}`, { method: 'DELETE' });
        onTeamMembersChange();
      };

      // Status functions
      const handleAddStatus = async () => {
        if (!newStatusName.trim()) return;
        const res = await api('/statuses', { method: 'POST', body: JSON.stringify({ name: newStatusName.trim(), color: newStatusColor }) });
        if (res && !res.error) { setNewStatusName(''); setNewStatusColor('#6b6b80'); onStatusesChange(); }
      };

      const handleUpdateStatus = async () => {
        if (!editStatus) return;
        await api(`/statuses/${editStatus.id}`, { method: 'PUT', body: JSON.stringify(editStatus) });
        setEditStatus(null); onStatusesChange();
      };

      const handleDeleteStatus = async (id) => {
        if (!confirm('Delete this status? Existing tickets with this status will keep it but it won\'t appear in the Kanban board.')) return;
        await api(`/statuses/${id}`, { method: 'DELETE' });
        onStatusesChange();
      };

      const handleMoveStatus = async (idx, dir) => {
        const newStatuses = [...statuses];
        const swapIdx = idx + dir;
        if (swapIdx < 0 || swapIdx >= newStatuses.length) return;
        [newStatuses[idx], newStatuses[swapIdx]] = [newStatuses[swapIdx], newStatuses[idx]];
        await api('/statuses/reorder', { method: 'PUT', body: JSON.stringify({ order: newStatuses.map(s => s.id) }) });
        onStatusesChange();
      };

      return (
        <div className="settings-panel">
          {/* Settings tabs */}
          <div style={{ display: 'flex', gap: 4, marginBottom: 20 }}>
            {[{ id: 'clients', label: 'Clients', icon: Icons.users }, { id: 'team', label: 'Team Members', icon: Icons.users }, { id: 'statuses', label: 'Statuses', icon: Icons.kanban }].map(t => (
              <button key={t.id} className={`btn ${settingsTab === t.id ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setSettingsTab(t.id)} style={{ gap: 6 }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {/* ---- CLIENTS TAB ---- */}
          {settingsTab === 'clients' && (
            <>
              <div className="settings-section">
                <div className="settings-section-header">
                  <h3>Client Management</h3>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <input className="form-control" placeholder="New client name" value={newClientName} onChange={e => setNewClientName(e.target.value)} style={{ width: 180, padding: '6px 10px' }} />
                    <input className="form-control" placeholder="Email (optional)" value={newClientEmail} onChange={e => setNewClientEmail(e.target.value)} style={{ width: 180, padding: '6px 10px' }} />
                    <button className="btn btn-primary btn-sm" onClick={handleAddClient}>{Icons.plus} Add Client</button>
                  </div>
                </div>
                <div className="settings-section-body">
                  {clients.map(c => (
                    <div key={c.client_name} className="client-card" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                        <div className="client-logo" style={{ background: c.branding?.primary_color || 'var(--accent-bg)', color: 'white' }}>
                          {c.logo_url ? <img src={c.logo_url} alt={c.client_name} /> : ini(c.client_name)}
                        </div>
                        <div className="client-info">
                          <h4>{c.client_name}</h4>
                          <p>{(c.users || []).length} user{(c.users || []).length !== 1 ? 's' : ''} · {c.ticketCount} ticket{c.ticketCount !== 1 ? 's' : ''}{c.branding?.slack_channel_name ? ` · ${c.branding.slack_channel_name}` : ''}</p>
                          <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
                            <div className="color-swatch" style={{ background: c.branding?.primary_color || '#6c5ce7' }} title="Primary" />
                            <div className="color-swatch" style={{ background: c.branding?.secondary_color || '#a29bfe' }} title="Secondary" />
                            <div className="color-swatch" style={{ background: c.branding?.accent_color || '#00b894' }} title="Accent" />
                          </div>
                        </div>
                        <div className="client-actions" style={{ flexWrap: 'wrap' }}>
                          <button className="btn btn-ghost btn-sm" onClick={() => handleEditClientInfo(c)}>
                            {Icons.settings} Edit
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={() => openManageUsers(c)}>
                            {Icons.users} Users
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={() => { const lr = document.createElement('input'); lr.type = 'file'; lr.accept = 'image/*'; lr.onchange = (e) => handleLogoUpload(e, c.client_name); lr.click(); }}>
                            {Icons.upload} Logo
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={() => handleEditBranding(c)}>
                            {Icons.palette} Colors
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={() => openSlackConfig(c)} style={c.branding?.slack_webhook_url ? { color: 'var(--green)' } : {}}>
                            {Icons.slack} Slack {c.branding?.slack_webhook_url ? '●' : ''}
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={() => { const ir = document.createElement('input'); ir.type = 'file'; ir.accept = '.csv,.tsv'; ir.onchange = (e) => handleImport(e, c.client_name); ir.click(); }} disabled={importing}>
                            {Icons.download} {importing ? 'Importing...' : 'Import CSV'}
                          </button>
                        </div>
                      </div>
                      {/* Inline user list preview */}
                      <div style={{ display: 'flex', gap: 6, marginTop: 10, flexWrap: 'wrap' }}>
                        {(c.users || []).map(u => (
                          <span key={u.id} style={{ fontSize: 11, padding: '3px 8px', background: 'var(--bg)', borderRadius: 4, color: 'var(--text-secondary)', border: '1px solid var(--border)' }}>
                            {u.name}{u.username !== u.name ? ` (${u.username})` : ''}
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
                  {clients.length === 0 && <p style={{ color: 'var(--text-dim)', padding: 20, textAlign: 'center' }}>No clients yet.</p>}
                  {importResult && <div className="import-result">Successfully imported {importResult.imported} of {importResult.total} tickets.</div>}
                  {importError && <div className="import-error">{importError}</div>}
                </div>
              </div>

              {/* Color Edit Modal */}
              {editClient && (
                <div className="modal-overlay" onClick={() => setEditClient(null)}>
                  <div className="modal" style={{ width: 420 }} onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                      <h2>Branding — {editClient.client_name}</h2>
                      <button className="close-btn" onClick={() => setEditClient(null)}>{Icons.x}</button>
                    </div>
                    <div className="modal-body">
                      <div className="color-input-group"><label>Primary</label>
                        <input type="color" value={colors.primary_color} onChange={e => setColors(c => ({ ...c, primary_color: e.target.value }))} />
                        <input className="form-control" type="text" value={colors.primary_color} onChange={e => setColors(c => ({ ...c, primary_color: e.target.value }))} style={{ width: 100 }} /></div>
                      <div className="color-input-group"><label>Secondary</label>
                        <input type="color" value={colors.secondary_color} onChange={e => setColors(c => ({ ...c, secondary_color: e.target.value }))} />
                        <input className="form-control" type="text" value={colors.secondary_color} onChange={e => setColors(c => ({ ...c, secondary_color: e.target.value }))} style={{ width: 100 }} /></div>
                      <div className="color-input-group"><label>Accent</label>
                        <input type="color" value={colors.accent_color} onChange={e => setColors(c => ({ ...c, accent_color: e.target.value }))} />
                        <input className="form-control" type="text" value={colors.accent_color} onChange={e => setColors(c => ({ ...c, accent_color: e.target.value }))} style={{ width: 100 }} /></div>
                      <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
                        <div style={{ flex: 1, height: 40, borderRadius: 6, background: colors.primary_color }} />
                        <div style={{ flex: 1, height: 40, borderRadius: 6, background: colors.secondary_color }} />
                        <div style={{ flex: 1, height: 40, borderRadius: 6, background: colors.accent_color }} />
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-ghost" onClick={() => setEditClient(null)}>Cancel</button>
                      <button className="btn btn-primary" onClick={saveBranding}>Save Colors</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Edit Client Info Modal */}
              {editClientInfo && (
                <div className="modal-overlay" onClick={() => setEditClientInfo(null)}>
                  <div className="modal" style={{ width: 460 }} onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                      <h2>Edit Client</h2>
                      <button className="close-btn" onClick={() => setEditClientInfo(null)}>{Icons.x}</button>
                    </div>
                    <div className="modal-body">
                      <div className="form-group"><label>Company Name</label>
                        <input className="form-control" value={editClientInfo.name} onChange={e => setEditClientInfo(c => ({ ...c, name: e.target.value }))} placeholder="Company name" /></div>
                      <div className="form-group"><label>Email</label>
                        <input className="form-control" type="email" value={editClientInfo.email} onChange={e => setEditClientInfo(c => ({ ...c, email: e.target.value }))} placeholder="contact@company.com" /></div>
                      <p style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 8 }}>Note: Changing the company name will also update the client's login credentials (username &amp; password become the new name), all associated tickets, and branding.</p>
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-ghost" onClick={() => setEditClientInfo(null)}>Cancel</button>
                      <button className="btn btn-primary" onClick={handleSaveClientInfo}>Save Changes</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Manage Users Modal */}
              {manageUsersFor && (
                <div className="modal-overlay" onClick={() => { setManageUsersFor(null); setEditUser(null); }}>
                  <div className="modal" style={{ width: 640 }} onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                      <h2>Users — {manageUsersFor}</h2>
                      <button className="close-btn" onClick={() => { setManageUsersFor(null); setEditUser(null); }}>{Icons.x}</button>
                    </div>
                    <div className="modal-body">
                      {/* Add new user form */}
                      <div style={{ padding: 16, background: 'var(--bg-elevated)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)', marginBottom: 20 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Add New User</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                          <input className="form-control" placeholder="Username *" value={newUser.username} onChange={e => setNewUser(u => ({ ...u, username: e.target.value }))} style={{ padding: '8px 12px' }} />
                          <input className="form-control" type="text" placeholder="Password *" value={newUser.password} onChange={e => setNewUser(u => ({ ...u, password: e.target.value }))} style={{ padding: '8px 12px' }} />
                          <input className="form-control" placeholder="Display Name (optional)" value={newUser.name} onChange={e => setNewUser(u => ({ ...u, name: e.target.value }))} style={{ padding: '8px 12px' }} />
                          <input className="form-control" type="email" placeholder="Email (optional)" value={newUser.email} onChange={e => setNewUser(u => ({ ...u, email: e.target.value }))} style={{ padding: '8px 12px' }} />
                        </div>
                        <button className="btn btn-primary btn-sm" style={{ marginTop: 10 }} onClick={handleAddUser}>{Icons.plus} Add User</button>
                      </div>

                      {/* User list */}
                      <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10 }}>Existing Users ({clientUsers.length})</div>
                      {clientUsers.map(u => (
                        <div key={u.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', background: 'var(--bg-elevated)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)', marginBottom: 8 }}>
                          <div className="avatar-sm" style={{ width: 36, height: 36, fontSize: 13, flexShrink: 0 }}>{ini(u.name || u.username)}</div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 13, fontWeight: 600 }}>{u.name || u.username}</div>
                            <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 2 }}>
                              Username: <strong>{u.username}</strong>
                              {u.email ? ` · ${u.email}` : ''}
                            </div>
                          </div>
                          <div style={{ display: 'flex', gap: 6 }}>
                            <button className="btn btn-ghost btn-sm" onClick={() => setEditUser({ ...u, newPassword: '' })}>{Icons.settings} Edit</button>
                            <button className="btn btn-danger btn-sm" onClick={() => handleDeleteUser(u.id)}>{Icons.x}</button>
                          </div>
                        </div>
                      ))}
                      {clientUsers.length === 0 && <p style={{ color: 'var(--text-dim)', fontSize: 13, textAlign: 'center', padding: 16 }}>No users yet for this company.</p>}
                    </div>
                  </div>
                </div>
              )}

              {/* Edit User Modal */}
              {editUser && (
                <div className="modal-overlay" onClick={() => setEditUser(null)} style={{ zIndex: 1100 }}>
                  <div className="modal" style={{ width: 460 }} onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                      <h2>Edit User</h2>
                      <button className="close-btn" onClick={() => setEditUser(null)}>{Icons.x}</button>
                    </div>
                    <div className="modal-body">
                      <div className="form-group"><label>Username</label>
                        <input className="form-control" value={editUser.username} onChange={e => setEditUser(u => ({ ...u, username: e.target.value }))} /></div>
                      <div className="form-group"><label>Display Name</label>
                        <input className="form-control" value={editUser.name || ''} onChange={e => setEditUser(u => ({ ...u, name: e.target.value }))} /></div>
                      <div className="form-group"><label>Email</label>
                        <input className="form-control" type="email" value={editUser.email || ''} onChange={e => setEditUser(u => ({ ...u, email: e.target.value }))} /></div>
                      <div className="form-group"><label>New Password <span style={{ fontWeight: 400, color: 'var(--text-dim)' }}>(leave blank to keep current)</span></label>
                        <input className="form-control" type="text" value={editUser.newPassword || ''} onChange={e => setEditUser(u => ({ ...u, newPassword: e.target.value }))} placeholder="Enter new password" /></div>
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-ghost" onClick={() => setEditUser(null)}>Cancel</button>
                      <button className="btn btn-primary" onClick={handleSaveUser}>Save Changes</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Slack Config Modal */}
              {slackConfig && (
                <div className="modal-overlay" onClick={() => setSlackConfig(null)}>
                  <div className="modal" style={{ width: 520 }} onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                      <h2>{Icons.slack} Slack — {slackConfig.client_name}</h2>
                      <button className="close-btn" onClick={() => setSlackConfig(null)}>{Icons.x}</button>
                    </div>
                    <div className="modal-body">
                      <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 16, lineHeight: 1.6 }}>
                        Link a Slack channel to receive notifications when tickets are created, updated, or commented on for this client.
                      </p>
                      <div className="form-group">
                        <label>Channel Name</label>
                        <input className="form-control" placeholder="#client-acme" value={slackConfig.slack_channel_name}
                          onChange={e => setSlackConfig(s => ({ ...s, slack_channel_name: e.target.value }))} />
                      </div>
                      <div className="form-group">
                        <label>Webhook URL</label>
                        <input className="form-control" placeholder="https://hooks.slack.com/services/T.../B.../xxx"
                          value={slackConfig.slack_webhook_url}
                          onChange={e => setSlackConfig(s => ({ ...s, slack_webhook_url: e.target.value }))}
                          style={{ fontFamily: 'monospace', fontSize: 12 }} />
                        <p style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 6 }}>
                          Create an Incoming Webhook in your Slack workspace: Apps → Incoming Webhooks → Add to Slack → Choose channel → Copy URL
                        </p>
                      </div>
                      {slackConfig.slack_webhook_url && (
                        <div style={{ padding: '12px 16px', background: 'var(--green-bg)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--green)', marginTop: 12 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}>
                            {Icons.bell} <strong>Notifications enabled</strong>
                          </div>
                          <p style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 4 }}>
                            New tickets, status changes, comments, and file uploads will be posted to {slackConfig.slack_channel_name || 'your Slack channel'}.
                          </p>
                        </div>
                      )}
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-ghost" onClick={() => setSlackConfig(null)}>Cancel</button>
                      <button className="btn btn-ghost" onClick={handleTestSlack} disabled={!slackConfig.slack_webhook_url || slackTesting}>
                        {slackTesting ? 'Sending...' : 'Test'} {Icons.slack}
                      </button>
                      <button className="btn btn-primary" onClick={handleSaveSlack}>Save</button>
                    </div>
                  </div>
                </div>
              )}

              <div className="settings-section">
                <div className="settings-section-header"><h3>CSV Import Guide</h3></div>
                <div className="settings-section-body" style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.7 }}>
                  <p>Upload a <strong>.csv</strong> or <strong>.tsv</strong> file to import tickets for a client. The importer auto-maps columns based on header names.</p>
                  <p style={{ marginTop: 8 }}><strong>Supported columns:</strong> Title/Name/Task, Description/Details, Status, Priority, Estimated Hours, Actual Hours, Assignee/Owner, Due Date, Approval Status</p>
                  <p style={{ marginTop: 8 }}>Works great with exports from Monday.com, Jira, Asana, Trello, and most project management tools.</p>
                </div>
              </div>
            </>
          )}

          {/* ---- TEAM MEMBERS TAB ---- */}
          {settingsTab === 'team' && (
            <div className="settings-section">
              <div className="settings-section-header">
                <h3>Team Members</h3>
                <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>People available for ticket assignment</span>
              </div>
              <div className="settings-section-body">
                {/* Add new member form */}
                <div style={{ display: 'flex', gap: 8, marginBottom: 20, flexWrap: 'wrap', padding: 16, background: 'var(--bg-elevated)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)' }}>
                  <input className="form-control" placeholder="Name *" value={newMemberName} onChange={e => setNewMemberName(e.target.value)} style={{ flex: '1 1 150px', padding: '8px 12px' }} />
                  <input className="form-control" placeholder="Email" value={newMemberEmail} onChange={e => setNewMemberEmail(e.target.value)} style={{ flex: '1 1 150px', padding: '8px 12px' }} />
                  <input className="form-control" placeholder="Role (e.g. Developer)" value={newMemberRole} onChange={e => setNewMemberRole(e.target.value)} style={{ flex: '1 1 130px', padding: '8px 12px' }} />
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                    <input type="color" value={newMemberColor} onChange={e => setNewMemberColor(e.target.value)} style={{ width: 36, height: 36, border: 'none', borderRadius: 4, cursor: 'pointer', background: 'none' }} />
                  </div>
                  <button className="btn btn-primary" onClick={handleAddMember}>{Icons.plus} Add</button>
                </div>

                {/* Member list */}
                {teamMembers.map(m => (
                  <div key={m.id} className="client-card">
                    <div className="avatar-sm" style={{ width: 40, height: 40, fontSize: 14, background: m.avatar_color + '22', color: m.avatar_color, flexShrink: 0 }}>{ini(m.name)}</div>
                    <div className="client-info">
                      <h4>{m.name}</h4>
                      <p>{m.role || 'No role'}{m.email ? ` · ${m.email}` : ''}</p>
                    </div>
                    <div className="client-actions">
                      <button className="btn btn-ghost btn-sm" onClick={() => setEditMember({ ...m })}>{Icons.settings} Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={() => handleDeleteMember(m.id)}>{Icons.x}</button>
                    </div>
                  </div>
                ))}
                {teamMembers.length === 0 && <p style={{ color: 'var(--text-dim)', padding: 20, textAlign: 'center' }}>No team members yet. Add your first one above.</p>}
              </div>

              {/* Edit Member Modal */}
              {editMember && (
                <div className="modal-overlay" onClick={() => setEditMember(null)}>
                  <div className="modal" style={{ width: 460 }} onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                      <h2>Edit Team Member</h2>
                      <button className="close-btn" onClick={() => setEditMember(null)}>{Icons.x}</button>
                    </div>
                    <div className="modal-body">
                      <div className="form-group"><label>Name</label>
                        <input className="form-control" value={editMember.name} onChange={e => setEditMember(m => ({ ...m, name: e.target.value }))} /></div>
                      <div className="form-group"><label>Email</label>
                        <input className="form-control" value={editMember.email || ''} onChange={e => setEditMember(m => ({ ...m, email: e.target.value }))} /></div>
                      <div className="form-group"><label>Role</label>
                        <input className="form-control" value={editMember.role || ''} onChange={e => setEditMember(m => ({ ...m, role: e.target.value }))} placeholder="e.g. Developer, Designer, PM" /></div>
                      <div className="color-input-group"><label>Avatar Color</label>
                        <input type="color" value={editMember.avatar_color || '#6c5ce7'} onChange={e => setEditMember(m => ({ ...m, avatar_color: e.target.value }))} />
                        <div className="avatar-sm" style={{ width: 40, height: 40, fontSize: 14, background: (editMember.avatar_color || '#6c5ce7') + '22', color: editMember.avatar_color || '#6c5ce7' }}>{ini(editMember.name)}</div>
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-ghost" onClick={() => setEditMember(null)}>Cancel</button>
                      <button className="btn btn-primary" onClick={handleUpdateMember}>Save</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ---- STATUSES TAB ---- */}
          {settingsTab === 'statuses' && (
            <div className="settings-section">
              <div className="settings-section-header">
                <h3>Custom Statuses</h3>
                <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>Drag to reorder · Used across Kanban, filters, and ticket forms</span>
              </div>
              <div className="settings-section-body">
                {/* Add new status form */}
                <div style={{ display: 'flex', gap: 8, marginBottom: 20, padding: 16, background: 'var(--bg-elevated)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border)' }}>
                  <input className="form-control" placeholder="Status name *" value={newStatusName} onChange={e => setNewStatusName(e.target.value)} style={{ flex: 1, padding: '8px 12px' }} />
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                    <input type="color" value={newStatusColor} onChange={e => setNewStatusColor(e.target.value)} style={{ width: 36, height: 36, border: 'none', borderRadius: 4, cursor: 'pointer', background: 'none' }} />
                  </div>
                  <button className="btn btn-primary" onClick={handleAddStatus}>{Icons.plus} Add Status</button>
                </div>

                {/* Status list */}
                {statuses.map((s, idx) => (
                  <div key={s.id} className="client-card" style={{ alignItems: 'center' }}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                      <button className="btn btn-ghost btn-sm" style={{ padding: '2px 4px', fontSize: 10, opacity: idx === 0 ? 0.3 : 1 }} onClick={() => handleMoveStatus(idx, -1)} disabled={idx === 0}>▲</button>
                      <button className="btn btn-ghost btn-sm" style={{ padding: '2px 4px', fontSize: 10, opacity: idx === statuses.length - 1 ? 0.3 : 1 }} onClick={() => handleMoveStatus(idx, 1)} disabled={idx === statuses.length - 1}>▼</button>
                    </div>
                    <div style={{ width: 24, height: 24, borderRadius: 6, background: s.color, flexShrink: 0 }} />
                    <div className="client-info">
                      <h4>{s.name}</h4>
                      <p style={{ fontFamily: 'monospace', fontSize: 11 }}>{s.color}</p>
                    </div>
                    <div className="client-actions">
                      <button className="btn btn-ghost btn-sm" onClick={() => setEditStatus({ ...s })}>{Icons.palette} Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={() => handleDeleteStatus(s.id)}>{Icons.x}</button>
                    </div>
                  </div>
                ))}
                {statuses.length === 0 && <p style={{ color: 'var(--text-dim)', padding: 20, textAlign: 'center' }}>No statuses defined. Add your first one above.</p>}
              </div>

              {/* Edit Status Modal */}
              {editStatus && (
                <div className="modal-overlay" onClick={() => setEditStatus(null)}>
                  <div className="modal" style={{ width: 400 }} onClick={e => e.stopPropagation()}>
                    <div className="modal-header">
                      <h2>Edit Status</h2>
                      <button className="close-btn" onClick={() => setEditStatus(null)}>{Icons.x}</button>
                    </div>
                    <div className="modal-body">
                      <div className="form-group"><label>Name</label>
                        <input className="form-control" value={editStatus.name} onChange={e => setEditStatus(s => ({ ...s, name: e.target.value }))} /></div>
                      <div className="color-input-group"><label>Color</label>
                        <input type="color" value={editStatus.color} onChange={e => setEditStatus(s => ({ ...s, color: e.target.value }))} />
                        <input className="form-control" type="text" value={editStatus.color} onChange={e => setEditStatus(s => ({ ...s, color: e.target.value }))} style={{ width: 100 }} />
                        <div style={{ width: 80, height: 28, borderRadius: 4, background: editStatus.color }} />
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button className="btn btn-ghost" onClick={() => setEditStatus(null)}>Cancel</button>
                      <button className="btn btn-primary" onClick={handleUpdateStatus}>Save</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ============ MAIN APP ============
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('dashboard');
      const [tickets, setTickets] = useState([]);
      const [stats, setStats] = useState({});
      const [search, setSearch] = useState('');
      const [filters, setFilters] = useState({ status: '', priority: '', client: '' });
      const [modal, setModal] = useState(null);
      const [customStatuses, setCustomStatuses] = useState([]);
      const [teamMembers, setTeamMembers] = useState([]);
      const [theme, setTheme] = useState(localStorage.getItem('devtrack_theme') || 'dark');
      const [clientBranding, setClientBranding] = useState(null);
      const [allClientNames, setAllClientNames] = useState([]);

      // Apply theme to document
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('devtrack_theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

      // Check existing session
      useEffect(() => {
        if (authToken) {
          api('/auth/me').then(u => { if (u && !u.error) setUser(u); setLoading(false); }).catch(() => setLoading(false));
        } else { setLoading(false); }
      }, []);

      const fetchTickets = async () => { const data = await api('/tickets'); if (Array.isArray(data)) setTickets(data); };
      const fetchStats = async () => { const data = await api('/stats'); if (data && !data.error) setStats(data); };
      const fetchStatuses = async () => {
        const data = await api('/statuses');
        if (Array.isArray(data) && data.length > 0) {
          setCustomStatuses(data);
          STATUSES = data.map(s => s.name);
          const colorMap = {};
          data.forEach(s => { colorMap[s.name] = s.color; });
          STATUS_COLORS = colorMap;
        }
      };
      const fetchTeamMembers = async () => {
        const data = await api('/team-members');
        if (Array.isArray(data)) { setTeamMembers(data); TEAM_MEMBERS = data; }
      };
      const fetchAllClientNames = async () => {
        const data = await api('/clients');
        if (Array.isArray(data)) setAllClientNames(data.map(c => c.client_name).sort());
      };
      const fetchClientBranding = async () => {
        const data = await api('/branding');
        if (data && !data.error && !Array.isArray(data)) {
          setClientBranding({
            ...data,
            logo_url: data.logo_filename ? `/uploads/logos/${data.logo_filename}` : null,
          });
        }
      };

      useEffect(() => {
        if (user) {
          fetchTickets(); fetchStats(); fetchStatuses(); fetchTeamMembers();
          if (user.role === 'admin') fetchAllClientNames();
          if (user.role !== 'admin') fetchClientBranding();
        }
      }, [user]);

      const isAdmin = user && user.role === 'admin';

      const filteredTickets = useMemo(() => {
        return tickets.filter(t => {
          if (filters.status && t.status !== filters.status) return false;
          if (filters.priority && t.priority !== filters.priority) return false;
          if (isAdmin && filters.client && t.client !== filters.client) return false;
          if (search && !t.title.toLowerCase().includes(search.toLowerCase()) && !(t.description || '').toLowerCase().includes(search.toLowerCase())) return false;
          return true;
        });
      }, [tickets, filters, search, isAdmin]);

      const clients = [...new Set([...allClientNames, ...tickets.map(t => t.client).filter(Boolean)])].sort();

      const handleLogin = (u) => { setUser(u); };
      const handleLogout = () => { localStorage.removeItem('devtrack_token'); authToken = ''; setUser(null); setTickets([]); setStats({}); };

      const handleSaveTicket = async (form) => {
        if (form.id) { await api(`/tickets/${form.id}`, { method: 'PUT', body: JSON.stringify(form) }); }
        else { await api('/tickets', { method: 'POST', body: JSON.stringify(form) }); }
        setModal(null); fetchTickets(); fetchStats();
      };
      const handleDeleteTicket = async (id) => { if (!confirm('Delete this ticket?')) return; await api(`/tickets/${id}`, { method: 'DELETE' }); setModal(null); fetchTickets(); fetchStats(); };
      const handleUpdateTicket = async (id, updates) => { await api(`/tickets/${id}`, { method: 'PUT', body: JSON.stringify(updates) }); fetchTickets(); fetchStats(); };

      if (loading) return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: 'var(--text-dim)' }}>Loading...</div>;
      if (!user) return <LoginPage onLogin={handleLogin} />;

      const views = [
        { id: 'dashboard', label: 'Dashboard', icon: Icons.dashboard },
        { id: 'kanban', label: 'Kanban', icon: Icons.kanban },
        { id: 'table', label: 'Table', icon: Icons.table },
        { id: 'timeline', label: 'Timeline', icon: Icons.timeline },
        { id: 'calendar', label: 'Calendar', icon: Icons.calendar },
      ];
      const viewTitles = { dashboard: 'Dashboard', kanban: 'Kanban Board', table: 'Table View', timeline: 'Timeline', calendar: 'Calendar', settings: 'Admin Settings' };
      const statusColorMap = {};
      customStatuses.forEach(s => { statusColorMap[s.name] = s.color; });
      const getStatusColor = (name) => statusColorMap[name] || STATUS_COLORS[name] || '#6b6b80';

      // Build branding style overrides for client portal
      const brandingStyle = (!isAdmin && clientBranding) ? {
        '--accent': clientBranding.primary_color,
        '--accent-light': clientBranding.secondary_color,
        '--accent-bg': clientBranding.primary_color + '1a',
      } : {};

      return (
        <div className="app" style={brandingStyle}>
          <div className="sidebar">
            <div className="sidebar-brand" style={!isAdmin && clientBranding ? { borderBottom: `2px solid ${clientBranding.primary_color}` } : {}}>
              {!isAdmin && clientBranding?.logo_url ? (
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <img src={clientBranding.logo_url} alt={user.client_name} style={{ width: 36, height: 36, borderRadius: 8, objectFit: 'cover' }} />
                  <div>
                    <h1 style={clientBranding ? { background: `linear-gradient(135deg, ${clientBranding.primary_color}, ${clientBranding.secondary_color})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' } : {}}>{user.client_name}</h1>
                    <p>Client Portal</p>
                  </div>
                </div>
              ) : (
                isAdmin ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <img src="/fluidtrack-logo.png" alt="FluidTrack" style={{ width: 36, height: 36, borderRadius: 8, objectFit: 'cover' }} />
                    <div>
                      <h1>FluidTrack</h1>
                      <p>Admin Portal</p>
                    </div>
                  </div>
                ) : (
                  <>
                    <h1 style={clientBranding ? { background: `linear-gradient(135deg, ${clientBranding.primary_color}, ${clientBranding.secondary_color})`, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' } : {}}>
                      {user.client_name}
                    </h1>
                    <p>Client Portal</p>
                  </>
                )
              )}
            </div>
            <div className="sidebar-nav">
              <div className="nav-section">
                <div className="nav-section-title">Views</div>
                {views.map(v => (
                  <div key={v.id} className={`nav-item ${view === v.id ? 'active' : ''}`} onClick={() => setView(v.id)}>
                    {v.icon}{v.label}
                    {v.id === 'kanban' && <span className="badge">{tickets.filter(t => t.status === 'In Progress').length}</span>}
                  </div>
                ))}
              </div>
              <div className="nav-section">
                <div className="nav-section-title">Quick Filters</div>
                <div className="nav-item" onClick={() => { setFilters({ status: '', priority: '', client: '' }); setView('table'); }}>
                  {Icons.table} All Tickets <span className="badge">{tickets.length}</span>
                </div>
                <div className="nav-item" onClick={() => { setFilters({ status: '', priority: 'Urgent', client: '' }); setView('table'); }}>
                  {Icons.alert} Urgent <span className="badge" style={{ background: 'var(--red)' }}>{tickets.filter(t => t.priority === 'Urgent').length}</span>
                </div>
                <div className="nav-item" onClick={() => { setFilters({ status: '', priority: '', client: '' }); setView('table'); }}>
                  {Icons.check} Needs Approval <span className="badge" style={{ background: 'var(--orange)' }}>{tickets.filter(t => t.approval_status === 'Pending').length}</span>
                </div>
              </div>
              {isAdmin && (
                <div className="nav-section">
                  <div className="nav-section-title">Clients</div>
                  {clients.map(c => (
                    <div key={c} className={`nav-item ${filters.client === c ? 'active' : ''}`} onClick={() => { setFilters(f => ({ ...f, client: f.client === c ? '' : c })); setView('table'); }}>
                      <div className="avatar-sm">{ini(c)}</div>{c}
                    </div>
                  ))}
                </div>
              )}
              {isAdmin && (
                <div className="nav-section">
                  <div className="nav-section-title">Admin</div>
                  <div className={`nav-item ${view === 'settings' ? 'active' : ''}`} onClick={() => setView('settings')}>
                    {Icons.settings} Settings
                  </div>
                </div>
              )}
            </div>
            <div className="sidebar-footer">
              <div className="sidebar-user">
                <div className="sidebar-user-avatar" style={{ background: isAdmin ? 'var(--accent-bg)' : (clientBranding ? clientBranding.primary_color + '22' : 'var(--green-bg)'), color: isAdmin ? 'var(--accent-light)' : (clientBranding ? clientBranding.primary_color : 'var(--green)') }}>
                  {isAdmin ? Icons.shield : ini(user.client_name)}
                </div>
                <div className="sidebar-user-info">
                  <div className="sidebar-user-name">{user.name}</div>
                  <div className="sidebar-user-role">{isAdmin ? 'Administrator' : 'Client'}</div>
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
                <div className="theme-toggle" onClick={toggleTheme}>
                  <span style={{ width: 16, height: 16, color: 'var(--text-dim)' }}>{theme === 'dark' ? Icons.moon : Icons.sun}</span>
                  <div className={`theme-switch ${theme === 'light' ? 'active' : ''}`}><div className="theme-switch-knob" /></div>
                  <span className="theme-toggle-label">{theme === 'light' ? 'Light' : 'Dark'}</span>
                </div>
                <button className="btn btn-ghost" style={{ fontSize: 10, padding: '4px 8px', color: 'var(--text-dim)' }} onClick={handleLogout}>
                  {Icons.logout} Sign Out
                </button>
              </div>
            </div>
          </div>

          <div className="main">
            <div className="topbar">
              <div className="topbar-left">
                <h2>{viewTitles[view] || 'Dashboard'}</h2>
                {view !== 'dashboard' && view !== 'settings' && (
                  <div style={{ display: 'flex', gap: 10 }}>
                    <select className="filter-bar" value={filters.status} onChange={e => setFilters(f => ({ ...f, status: e.target.value }))}>
                      <option value="">All Statuses</option>{(customStatuses.length > 0 ? customStatuses.map(s => s.name) : STATUSES).map(s => <option key={s}>{s}</option>)}</select>
                    <select className="filter-bar" value={filters.priority} onChange={e => setFilters(f => ({ ...f, priority: e.target.value }))}>
                      <option value="">All Priorities</option>{PRIORITIES.map(p => <option key={p}>{p}</option>)}</select>
                    {isAdmin && <select className="filter-bar" value={filters.client} onChange={e => setFilters(f => ({ ...f, client: e.target.value }))}>
                      <option value="">All Clients</option>{clients.map(c => <option key={c}>{c}</option>)}</select>}
                  </div>
                )}
              </div>
              <div className="topbar-right">
                {view !== 'settings' && <>
                  <div className="search-box">{Icons.search}<input placeholder="Search tickets..." value={search} onChange={e => setSearch(e.target.value)} /></div>
                  <button className="btn btn-primary" onClick={() => setModal({ ticket: null, isNew: true })}>{Icons.plus} New Ticket</button>
                </>}
              </div>
            </div>

            <div className="content">
              {view === 'dashboard' && <DashboardView tickets={filteredTickets} stats={stats} user={user} />}
              {view === 'kanban' && <KanbanView tickets={filteredTickets} onTicketClick={t => setModal({ ticket: t, isNew: false })} onUpdateTicket={handleUpdateTicket} user={user} statuses={customStatuses} />}
              {view === 'table' && <TableView tickets={filteredTickets} onTicketClick={t => setModal({ ticket: t, isNew: false })} user={user} />}
              {view === 'timeline' && <TimelineView tickets={filteredTickets} onTicketClick={t => setModal({ ticket: t, isNew: false })} />}
              {view === 'calendar' && <CalendarView tickets={filteredTickets} onTicketClick={t => setModal({ ticket: t, isNew: false })} />}
              {view === 'settings' && isAdmin && <AdminSettingsView onRefresh={() => { fetchTickets(); fetchStats(); fetchAllClientNames(); }} statuses={customStatuses} teamMembers={teamMembers} onStatusesChange={fetchStatuses} onTeamMembersChange={fetchTeamMembers} />}
            </div>
          </div>

          {modal && <TicketModal ticket={modal.ticket} isNew={modal.isNew} onClose={() => setModal(null)} onSave={handleSaveTicket} onDelete={handleDeleteTicket} user={user} statuses={customStatuses} teamMembers={teamMembers} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
